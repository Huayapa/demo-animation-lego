<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test gasp</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body class="bg-[#FFFFFF]">
  <main>
    <div id="three-container"></div>


    <section class="section-violet min-h-[40rem] bg-violet-300 flex items-center">
      <h1 class="title text-8xl font-bold relative z-20 ml-[10vw]">Soy el titulo</h1>
    </section>
    <section class="min-h-[40rem] bg-violet-300">
      <img class="w-full min-h-[40rem] object-cover relative z-10" src="assets/img/imgtest.webp" alt="">
    </section>
    <section class="min-h-[40rem]"></section>
    <section class="section-liquid min-h-[40rem] ">
      <div class="w-full min-h-[40rem] bg-violet-300 rounded-[10rem_0_0_10rem]"></div>
    </section>
    <section class="min-h-[40rem]"></section>
    <section class="section-liquid min-h-[40rem] bg-violet-300">
      <img class="w-full min-h-[40rem] object-cover rounded-[10rem]" src="assets/img/imgtest.webp" alt="">
    </section>
    <section class="min-h-[40rem] bg-violet-300"></section>
    <section class="h-[30rem] bg-violet-300 ">
      <img class="w-full h-[30rem] object-cover rounded-[10rem] relative z-10" src="assets/img/imgtest.webp" alt="">
    </section>
    <section class="min-h-[40rem]"></section>
    <section class="min-h-[40rem]"></section>
    <section class="min-h-[20rem] bg-violet-300">
      <div class="img-box">
        <img 
        class="img-reel w-full min-h-[20rem] object-cover rounded-[10rem_0_0_10rem]"
        src="assets/img/imgtest.webp"
        alt="">
      </div>
    </section>
    <section class="min-h-[40rem] bg-slate-800 ">
      <div class="min-h-[40rem] rounded-[0_0_20rem_20rem] bg-white"></div>
    </section>
  
    <footer class="min-h-[60rem] bg-slate-800 relative z-10"></footer>
  </main>

  <script type="module" src="main.js"></script>
</body>
</html>
